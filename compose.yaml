services:
  web:
    image: ${WEB_IMAGE:?Set WEB_IMAGE to the GHCR image, for example ghcr.io/etic-club/s2ee-2026:latest}
    container_name: s2ee-ralph-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL for your external Postgres container}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?Set BETTER_AUTH_URL}
      CORS_ORIGIN: ${CORS_ORIGIN:?Set CORS_ORIGIN}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET:?Set S3_BUCKET}
      S3_ENDPOINT: ${S3_ENDPOINT:?Set S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-us-east-1}
