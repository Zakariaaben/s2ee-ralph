name: Build & Deploy via Coolify

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # ⚠️ en minuscules : <owner>/<repo>
  IMAGE_NAME: etic-club/s2ee-2026

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # nécessaire pour pousser sur GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # (Optionnel) Vérifier/corriger la casse (minuscule) pour GHCR
      - name: Ensure lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          # Si ton image est privée, utilise un PAT avec read:packages stocké dans secrets.TOKEN
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          # Ajoute arm64 si tu en as besoin sur ta cible (ex: serveurs ARM)
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to dokploy 
        run: |
          curl --fail --silent --show-error \
            "${{ secrets.DOKPLOY_WEBHOOK }}"